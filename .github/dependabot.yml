version: 2
updates:
  # npm dependencies, grouped so minor/patch bumps come as one PR.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Keep the GitHub Actions in our workflows up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
