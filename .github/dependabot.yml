version: 2
updates:
  # npm dependencies. Expo-managed packages move with the SDK and are upgraded
  # via `npx expo install`, so Dependabot ignores them. It also ignores all major
  # bumps here, which need a manual review (e.g. ESLint 10 breaks eslint-config-expo).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      - dependency-name: "@expo-google-fonts/*"
      - dependency-name: "@react-native-async-storage/async-storage"
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
